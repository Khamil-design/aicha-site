    color:white;
    text-align:center;

}

.video-card{

    background:white;

    border-radius:20px;

    box-shadow:0 12px 30px rgba(0,0,0,.08);

    overflow:hidden;

    margin-bottom:35px;

    transition:.3s;

}

.video-card:hover{

    transform:translateY(-6px);

}

.video-title{

    padding:20px;

    text-align:center;

    font-size:20px;

    font-weight:bold;

}

iframe{

    width:100%;

    height:250px;

    border:none;

    color:white;

    text-align:center;

    padding:30px;

    margin-top:60px;
