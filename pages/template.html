<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">

<title>عنوان الصفحة</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<link rel="stylesheet" href="../style.css">

<style>
body{
    background:#f7f7f5;
    font-family:'Noto Naskh Arabic',serif;

.hero{

    text-align:center;
    padding:70px 20px;
}

.hero h1{
    font-family:'Cairo',sans-serif;

}

.publication-card{
    background:white;
    border-radius:20px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    overflow:hidden;
    margin-top:50px;
    margin-bottom:60px;
}

.publication-content{
    padding:35px;
}

.publication-content h2{
    color:#1E6B5B;

    font-family:'Cairo',sans-serif;
}

.publication-content p{
    font-size:21px;
    line-height:2;
    text-align:justify;
}

.gallery-img{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;

footer{
    background:#163d36;

</div>

</div>

</div>
